version: 1.1.0
id: urn:dataform:staging:sales:orders_raw
name: orders_raw
description: "Enterprise Staging Layer for Warehouse Orders. Handles raw-to-typed conversion and validation of order telemetry."
status: active
owner: sales_ops_data_team

# Data Platform Metadata
service: bigquery
dataset: staging
project: sentinel-486707

schema:
  - column: order_id
    type: INT64
    description: "Unique identifier for each order."
    primary_key: true
    constraints:
      not_null: true
      unique: true

  - column: customer_name
    type: STRING
    description: "Full name of the customer who placed the order."
    classification: PII
    constraints:
      not_null: true

  - column: amount
    type: NUMERIC
    description: "Total order value."
    constraints:
      not_null: true
    tests:
      - type: range
        min: 0
        max: 1000000

  - column: status
    type: STRING
    description: "Current lifecycle status of the order."
    tests:
      - type: accepted_values
        values:
          [
            "COMPLETED",
            "PENDING",
            "SHIPPED",
            "DELIVERED",
            "CANCELLED",
            "RETURNED",
          ]

  - column: order_date
    type: DATE
    description: "The date the order was recorded."
    constraints:
      not_null: true

  - column: warehouse_id
    type: INT64
    description: "Identifier for the fulfillment center."
    constraints:
      not_null: true

  - column: batch_date
    type: DATE
    description: "Audit column: The processing date for the ingestion batch."
    default: "9999-12-31"
    constraints:
      not_null: true

  - column: processed_dttm
    type: TIMESTAMP
    description: "Audit column: The exact time the record entered the warehouse."
    default: "CURRENT_TIMESTAMP()"
    constraints:
      not_null: true

# Service Level Objectives (SLOs)
service_level_agreement:
  freshness:
    period: 24h
    description: "Orders must be available in the warehouse within 24 hours of placement."
  completeness:
    percentage: 98.0
    description: "SLA allows for up to 2% quarantine rate for dirty raw source data."

changelog:
  - date: "2026-03-22"
    changes: "Initial contract generation based on warehouse order ingestion samples."
  - date: "2026-03-28"
    changes: "Automated schema drift resolution. Added: ['order_id', 'customer_name', 'amount', 'status', 'order_date', 'warehouse_id']. Removed: []."