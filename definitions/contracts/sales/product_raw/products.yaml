version: 1.0.0
id: urn:dataform:staging:sales:stg_products
name: stg_products
description: "Enterprise Staging Layer for Product Catalog. Enforces SKU formatting and price integrity."
status: active
owner: catalog_management_team

# Data Platform Metadata
service: bigquery
dataset: staging
project: sentinel-486707

schema:
  - column: product_id
    type: STRING
    description: "Unique identifier for the product (SKU)."
    primary_key: true
    business_unit: "Inventory"
    constraints:
      not_null: true
      unique: true
    tests:
      - type: regex
        pattern: "^P_ID_[0-9]{3}$" # Matches your sample P_ID_001 pattern

  - column: product_name
    type: STRING
    description: "Full descriptive name of the product."
    constraints:
      not_null: true

  - column: category
    type: STRING
    description: "Product category for inventory classification."
    tests:
      - type: accepted_values
        values: ["Storage", "Electronics", "Furniture", "Maintenance"]

  - column: base_price
    type: NUMERIC
    description: "Standard retail price before taxes or discounts."
    constraints:
      not_null: true
    tests:
      - type: range
        min: 0.01
        max: 50000.00

  - column: batch_date
    type: DATE
    description: "Processing batch date for idempotency."
    default: "9999-12-31"
    constraints:
      not_null: true

  - column: processed_dttm
    type: TIMESTAMP
    description: "Audit timestamp of when the record entered the BigQuery warehouse."
    default: "CURRENT_TIMESTAMP()"
    constraints:
      not_null: true

# Service Level Objectives (SLOs)
service_level_agreement:
  freshness:
    period: 24h
    description: "Product catalog must be synced daily."
  completeness:
    percentage: 100
    description: "Zero tolerance for missing product master data."