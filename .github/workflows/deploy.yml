name: "Sentinel Deploy"

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  terraform:
    name: "Terraform Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Store your SA JSON in GitHub Secrets

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./infra

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: ./infra

  dataform:
    name: "Dataform Compile & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dataform CLI
        run: npm install -g @dataform/cli

      - name: Install Project Dependencies
        run: npm install

      # FEATURE ADDITION: Create the specific credentials file Dataform expects
      - name: Generate Dataform Credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > .df-credentials.json

      - name: Compile Dataform
        run: dataform compile

      - name: Test Dataform
        run: dataform test

      # SECURITY BEST PRACTICE: Delete the key immediately after execution
      - name: Cleanup Credentials
        if: always() # Ensures this runs even if the compile step fails
        run: rm -f .df-credentials.json