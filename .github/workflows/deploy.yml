name: "Sentinel Deploy"

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  terraform:
    name: "Terraform Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Store your SA JSON in GitHub Secrets

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./infra

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: ./infra

  dataform:
    name: "Dataform Compile & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This step authenticates the runner environment behind the scenes
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dataform CLI
        run: npm install -g @dataform/cli

      - name: Install Project Dependencies
        run: npm install

      # THE FIX: Provide the exact config object Dataform expects for ADC auth
      - name: Generate Dataform Credentials
        run: |
          echo '{
            "projectId": "sentinel-486707",
            "location": "US"
          }' > .df-credentials.json

      - name: Compile Dataform
        run: dataform compile
        # Validates syntax, dependencies, and circular references safely

      # - name: Test Dataform
      #   run: dataform test
      # Executes your custom assertion unit tests

      # AUTOMATED EXECUTION: Only runs when a PR is merged into master
      - name: Run Dataform (Deploy to BigQuery)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: dataform run

      # SECURITY BEST PRACTICE: Wipe the config file
      - name: Cleanup Credentials
        if: always()
        run: rm -f .df-credentials.json
